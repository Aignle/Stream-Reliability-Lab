services:
  api:
    build: .
    environment:
      STREAMLAB_DB_PATH: /data/streamlab.duckdb
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - streamlab-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  dashboard:
    build: .
    command:
      - python
      - -m
      - streamlit
      - run
      - src/streamlab/dashboard.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
      - --browser.gatherUsageStats=false
    environment:
      STREAMLAB_API_URL: http://api:8000
    ports:
      - "127.0.0.1:${STREAMLAB_DASHBOARD_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2)"
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

volumes:
  streamlab-data:

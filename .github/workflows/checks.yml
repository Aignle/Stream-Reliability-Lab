name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit, integration, and dashboard tests
        run: python -m pytest

      - name: Run static checks
        run: |
          python -m ruff check .
          python -m ruff format --check .
          python -m mypy src
          python -m pip check
          node --check src/streamlab/static/overlay.js

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and Chromium
        run: |
          python -m pip install -e ".[dev]"
          python -m playwright install --with-deps chromium

      - name: Prove browser vertical slice
        run: python -m pytest -m e2e

      - name: Reconcile fixed-seed 500-event scenario
        run: python -m pytest -m scenario

  compose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build and start local stack
        run: docker compose up --build --wait

      - name: Check API and dashboard health
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8000/health
          curl --fail --silent --show-error http://127.0.0.1:8501/_stcore/health

      - name: Prove container lifecycle and service networking
        run: |
          docker compose exec -T api python -m streamlab.simulator \
            --scenario forced_reconnect \
            --seed 20250314 \
            --count 12 \
            --rate 1000 \
            --api-url http://127.0.0.1:8000 \
            --ws-url ws://127.0.0.1:8000 \
            --result-file /tmp/compose-result.json
          docker compose exec -T api python - <<'PY'
          import json
          import urllib.request

          result = json.load(open("/tmp/compose-result.json", encoding="utf-8"))
          with urllib.request.urlopen(result["analytics_url"], timeout=5) as response:
              overview = json.load(response)
          assert result["completed"] is True
          assert result["client_acked_unique"] == 12
          assert result["accepted_replies"] == 11
          assert result["duplicate_replies"] == 1
          assert result["retries"] == 1
          assert overview["delivered"] == 13
          assert overview["unique_events"] == 12
          assert overview["acknowledged"] == 12
          assert overview["processed"] == 12
          assert overview["duplicates"] == 1
          assert overview["scenario_checks"]["forced_reconnect"]["passed"] is True
          assert overview["verdict"] == "incomplete"
          PY
          docker compose exec -T dashboard python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("http://api:8000/api/runs/latest", timeout=5) as response:
              latest = json.load(response)
          assert latest["scenario"] == "forced_reconnect"
          assert latest["status"] == "completed"
          PY

      - name: Show service logs after failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop local stack
        if: always()
        run: docker compose down --volumes
